<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Services</title>

<style>
body { margin:0; background:#0f0f10; color:white; font-family:Arial; }

nav {
  display:flex; justify-content:space-between;
  padding:15px 50px;
  background:#141416;
}

.nav-links a { margin:0 12px; color:white; text-decoration:none; }

.logo img { height:50px; }

main { padding:30px 50px; max-width:1100px; margin:0 auto; }

h1 { margin-top:0; }

.intro { color:#aaa; margin-bottom:30px; }

.cat { margin-bottom:30px; }

.cat-title {
  color:gold;
  text-transform:uppercase;
  letter-spacing:2px;
  font-size:16px;
  margin-bottom:12px;
  border-bottom:1px solid #2a2a2c;
  padding-bottom:6px;
}

.service-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
  gap:12px;
}

.service {
  background:#1a1a1c;
  cursor:pointer;
  overflow:hidden;
  border:1px solid transparent;
  transition:border-color 0.15s, transform 0.15s;
  display:flex; flex-direction:column;
  position:relative;
}

.service:hover { border-color:gold; transform:translateY(-2px); }

.service .img {
  width:100%;
  aspect-ratio:4/3;
  background:#0f0f10 center/cover no-repeat;
}

.service .body { padding:16px; }

.service .name { font-weight:bold; font-size:16px; }
.service .desc { color:#888; font-size:13px; margin:4px 0 10px; }
.service .price { color:gold; font-weight:bold; }

.service .del-x, .service .edit-p {
  position:absolute; top:8px;
  width:28px; height:28px; border-radius:50%;
  background:rgba(0,0,0,0.7);
  font-size:14px; line-height:1; cursor:pointer;
  display:none;
  align-items:center; justify-content:center;
  padding:0;
  transition:background 0.15s, color 0.15s;
}
.service .del-x { right:8px; color:#ff8a8a; border:1px solid #ff8a8a; font-size:18px; }
.service .del-x:hover { background:#ff8a8a; color:black; }

.service .edit-p { right:44px; color:gold; border:1px solid gold; }
.service .edit-p:hover { background:gold; color:black; }

.empty {
  background:#1a1a1c;
  padding:30px;
  text-align:center;
  color:#aaa;
}

/* Admin-only UI: hidden by default, shown when body has .is-admin */
.admin-only { display:none; }
body.is-admin .admin-only { display:block; }
body.is-admin .service .del-x,
body.is-admin .service .edit-p { display:flex; }

.admin-panel {
  background:#1a1a1c;
  border-top:3px solid gold;
  padding:20px;
  margin-bottom:30px;
}
.admin-panel h3 {
  margin:0 0 15px;
  color:gold;
  text-transform:uppercase;
  letter-spacing:1px;
  font-size:16px;
}

.img-row {
  display:flex; align-items:center; gap:12px;
  margin-bottom:14px; padding-bottom:14px;
  border-bottom:1px dashed #2a2a2c;
  flex-wrap:wrap;
}
.img-preview {
  width:70px; height:70px;
  background:#0f0f10 center/cover no-repeat;
  border:1px solid #333;
  flex-shrink:0;
}
.img-preview.empty {
  display:flex; align-items:center; justify-content:center;
  color:#444; font-size:11px; text-align:center;
}
.file-btn {
  background:#333; color:white; padding:8px 14px; cursor:pointer; display:inline-block;
}
.file-btn:hover { background:#444; }
.img-row input[type=file] { display:none; }
.remove-img {
  background:transparent; color:#ff8a8a; border:1px solid #ff8a8a;
  padding:7px 12px; cursor:pointer;
}

.fields {
  display:grid;
  grid-template-columns: 1.5fr 1fr 1fr 2fr auto;
  gap:10px;
}
.fields input {
  padding:9px; background:#0f0f10; color:white; border:1px solid #333;
  width:100%; box-sizing:border-box;
}
.fields button {
  padding:10px 18px; background:gold; color:black;
  border:none; cursor:pointer; font-weight:bold; white-space:nowrap;
}

@media (max-width:900px){
  .fields { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<nav>
  <div class="logo">
    <a href="index.html">
      <img src="https://d1csarkz8obe9u.cloudfront.net/posterpreviews/nail-tech-logo-%281%29-design-template-10982053ba8b9b5f1ef10670c9d40346_screen.jpg?ts=1690067431">
    </a>
  </div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="services.html">Book</a>
    <a href="bookings.html">My Bookings</a>
    <span id="authNav"></span>
  </div>
</nav>

<main>
<h1>Services</h1>
<p class="intro">Pick a service to book your appointment.</p>

<div class="admin-panel admin-only">
  <h3 id="panelTitle">Add a Service</h3>
  <div class="img-row">
    <div id="svcImgPreview" class="img-preview empty">No photo</div>
    <label class="file-btn">
      Choose Photo
      <input type="file" id="svcImgInput" accept="image/*">
    </label>
    <button type="button" class="remove-img" id="svcImgRemoveBtn" onclick="clearImg()" style="display:none">Remove</button>
    <span style="color:#888; font-size:13px;">Optional. Photos are auto-resized.</span>
  </div>
  <div class="fields">
    <input id="svcName" placeholder="Name (e.g. Gel Manicure)">
    <input id="svcPrice" placeholder="Price (e.g. $35)">
    <input id="svcCategory" list="catList" placeholder="Category">
    <datalist id="catList"></datalist>
    <input id="svcDesc" placeholder="Description (optional)">
    <div style="display:flex; gap:6px;">
      <button id="saveBtn" onclick="saveService()">Add Service</button>
      <button id="cancelBtn" onclick="cancelEdit()" style="display:none; background:#333; color:white; padding:10px 14px; border:none; cursor:pointer;">Cancel</button>
    </div>
  </div>
</div>

<div id="servicesList"></div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="auth-nav.js"></script>

<script>
const CATEGORY_ORDER = ["Manicures", "Pedicures", "Extensions & Enhancements", "Nail Art", "Add-Ons & Care"];
const list = document.getElementById("servicesList");
const db = firebase.database();
let isAdmin = false;
let currentImage = "";
let currentMaxOrder = 0;
let editingId = null;

function escapeHtml(s){ return (s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function book(service){
  localStorage.setItem("selectedService", service);
  window.location = "appointment.html";
}

firebase.auth().onAuthStateChanged(user => {
  isAdmin = !!(user && isAdminEmail(user.email));
  document.body.classList.toggle("is-admin", isAdmin);
});

/* ----- Image picker ----- */
document.getElementById("svcImgInput").addEventListener("change", e => {
  let file = e.target.files[0];
  if(!file) return;
  resizeImage(file, 700, dataUrl => {
    currentImage = dataUrl;
    showPreview(dataUrl);
  });
  e.target.value = "";
});

function resizeImage(file, maxDim, cb){
  let img = new Image();
  let reader = new FileReader();
  reader.onload = ev => {
    img.onload = () => {
      let w = img.width, h = img.height;
      if(w > h){ if(w > maxDim){ h = h * (maxDim/w); w = maxDim; } }
      else { if(h > maxDim){ w = w * (maxDim/h); h = maxDim; } }
      let c = document.createElement("canvas");
      c.width = Math.round(w); c.height = Math.round(h);
      c.getContext("2d").drawImage(img, 0, 0, w, h);
      cb(c.toDataURL("image/jpeg", 0.82));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function showPreview(url){
  let p = document.getElementById("svcImgPreview");
  if(url){
    p.classList.remove("empty");
    p.innerText = "";
    p.style.backgroundImage = `url("${url}")`;
    document.getElementById("svcImgRemoveBtn").style.display = "inline-block";
  } else {
    p.classList.add("empty");
    p.innerText = "No photo";
    p.style.backgroundImage = "";
    document.getElementById("svcImgRemoveBtn").style.display = "none";
  }
}

function clearImg(){ currentImage = ""; showPreview(""); }

/* ----- Save (add or edit) ----- */
function saveService(){
  if(!isAdmin) return;
  let name = document.getElementById("svcName").value.trim();
  let price = document.getElementById("svcPrice").value.trim();
  let category = document.getElementById("svcCategory").value.trim() || "Other";
  let description = document.getElementById("svcDesc").value.trim();
  if(!name || !price){ alert("Name and price are required."); return; }

  let payload = { name, price, category, description, image: currentImage || "" };

  if(editingId){
    db.ref("services/" + editingId).update(payload).then(resetForm);
  } else {
    payload.order = currentMaxOrder + 1;
    db.ref("services").push(payload).then(resetForm);
  }
}

function editSvc(id, s){
  if(!isAdmin) return;
  editingId = id;
  document.getElementById("svcName").value = s.name || "";
  document.getElementById("svcPrice").value = s.price || "";
  document.getElementById("svcCategory").value = s.category || "";
  document.getElementById("svcDesc").value = s.description || "";
  currentImage = s.image || "";
  showPreview(currentImage);
  document.getElementById("panelTitle").innerText = "Edit Service";
  document.getElementById("saveBtn").innerText = "Save Changes";
  document.getElementById("cancelBtn").style.display = "inline-block";
  let panel = document.querySelector(".admin-panel");
  window.scrollTo({ top: panel.offsetTop - 30, behavior: "smooth" });
}

function cancelEdit(){ resetForm(); }

function resetForm(){
  editingId = null;
  document.getElementById("svcName").value = "";
  document.getElementById("svcPrice").value = "";
  document.getElementById("svcCategory").value = "";
  document.getElementById("svcDesc").value = "";
  clearImg();
  document.getElementById("panelTitle").innerText = "Add a Service";
  document.getElementById("saveBtn").innerText = "Add Service";
  document.getElementById("cancelBtn").style.display = "none";
}

/* ----- Delete ----- */
function deleteSvc(id, name){
  if(!isAdmin) return;
  if(!window.confirm(`Delete "${name}"?`)) return;
  if(editingId === id) resetForm();
  db.ref("services/" + id).remove();
}

/* ----- Render list ----- */
db.ref("services").on("value", snap => {
  let data = snap.val() || {};
  let entries = Object.entries(data);
  currentMaxOrder = entries.reduce((m, [_,s]) => Math.max(m, s.order || 0), 0);

  // Update category suggestions
  let cats = new Set(CATEGORY_ORDER);
  entries.forEach(([_,s]) => { if(s.category) cats.add(s.category); });
  document.getElementById("catList").innerHTML =
    Array.from(cats).map(c => `<option value="${c}">`).join("");

  if(entries.length === 0){
    list.innerHTML = `<div class="empty">No services available right now. Please check back soon.</div>`;
    return;
  }

  let groups = {};
  entries.forEach(([id, s]) => {
    let cat = s.category || "Other";
    (groups[cat] = groups[cat] || []).push({id, ...s});
  });
  Object.values(groups).forEach(arr => arr.sort((a,b) => (a.order||0) - (b.order||0) || a.name.localeCompare(b.name)));

  let orderedCats = [];
  CATEGORY_ORDER.forEach(c => { if(groups[c]) orderedCats.push(c); });
  Object.keys(groups).filter(c => !CATEGORY_ORDER.includes(c)).sort().forEach(c => orderedCats.push(c));

  list.innerHTML = "";
  for(let cat of orderedCats){
    let section = document.createElement("div");
    section.className = "cat";
    section.innerHTML = `<div class="cat-title">${escapeHtml(cat)}</div>`;
    let grid = document.createElement("div");
    grid.className = "service-grid";
    for(let s of groups[cat]){
      let card = document.createElement("div");
      card.className = "service";
      let imgHtml = s.image
        ? `<div class="img" style="background-image:url('${s.image}')"></div>`
        : `<div class="img" style="background:linear-gradient(135deg,#2a1a2c,#1a1a1c); display:flex; align-items:center; justify-content:center; color:#444; font-size:13px;">No photo yet</div>`;
      card.innerHTML = `
        ${imgHtml}
        <button class="edit-p" title="Edit this service">✎</button>
        <button class="del-x" title="Delete this service">×</button>
        <div class="body">
          <div class="name">${escapeHtml(s.name)}</div>
          ${s.description ? `<div class="desc">${escapeHtml(s.description)}</div>` : ""}
          <div class="price">${escapeHtml(s.price || "")}</div>
        </div>
      `;
      card.addEventListener("click", () => book(s.name));
      card.querySelector(".edit-p").addEventListener("click", e => {
        e.stopPropagation();
        editSvc(s.id, s);
      });
      card.querySelector(".del-x").addEventListener("click", e => {
        e.stopPropagation();
        deleteSvc(s.id, s.name);
      });
      grid.appendChild(card);
    }
    section.appendChild(grid);
    list.appendChild(section);
  }
});
</script>

<footer style="background:#0a0a0b; padding:25px 20px; text-align:center; color:#666; font-size:13px; border-top:1px solid #2a2a2c; margin-top:40px;">

</footer>

</body>
</html>
