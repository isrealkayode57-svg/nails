<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Login</title>

<style>
body { margin:0; background:#0f0f10; color:white; font-family:Arial; display:flex; flex-direction:column; min-height:100vh; }
.box { background:#1a1a1c; padding:25px; width:320px; border-top:4px solid gold; margin:auto; }
h2 { margin-top:0; }
input, button { width:100%; padding:10px; margin:8px 0; box-sizing:border-box; }
button { background:gold; border:none; cursor:pointer; font-weight:bold; }
.tabs { display:flex; margin-bottom:15px; }
.tab { flex:1; padding:10px; text-align:center; cursor:pointer; background:#222; }
.tab.active { background:gold; color:black; font-weight:bold; }
.msg { color:#ff8a8a; min-height:18px; margin:6px 0; font-size:14px; }
.guest-link { display:block; text-align:center; margin-top:12px; color:#aaa; cursor:pointer; text-decoration:underline; }
</style>
</head>

<body>

<div class="box">
  <div class="tabs">
    <div id="tabLogin" class="tab active" onclick="showMode('login')">Login</div>
    <div id="tabSignup" class="tab" onclick="showMode('signup')">Sign Up</div>
  </div>

  <h2 id="title">Login</h2>

  <input id="user" placeholder="username">
  <input id="pass" type="password" placeholder="password">
  <input id="pass2" type="password" placeholder="confirm password" style="display:none">

  <div id="msg" class="msg"></div>

  <button id="submitBtn" onclick="submit()">Login</button>
  <span class="guest-link" onclick="guest()">Continue as guest</span>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
const auth = firebase.auth();
let mode = "login";

function showMode(m){
  mode = m;
  document.getElementById("tabLogin").classList.toggle("active", m==="login");
  document.getElementById("tabSignup").classList.toggle("active", m==="signup");
  document.getElementById("title").innerText = m==="login" ? "Login" : "Sign Up";
  document.getElementById("submitBtn").innerText = m==="login" ? "Login" : "Create Account";
  document.getElementById("pass2").style.display = m==="signup" ? "block" : "none";
  setMsg("");
}

function setMsg(text){
  document.getElementById("msg").innerText = text;
}

function submit(){
  let u = document.getElementById("user").value.trim();
  let p = document.getElementById("pass").value;

  if(!u || !p){ setMsg("Please enter a username and password."); return; }

  let email = usernameToEmail(u);

  if(mode === "signup"){
    let p2 = document.getElementById("pass2").value;
    if(p !== p2){ setMsg("Passwords don't match."); return; }
    if(p.length < 6){ setMsg("Password must be at least 6 characters."); return; }

    auth.createUserWithEmailAndPassword(email, p)
      .then(cred => cred.user.updateProfile({ displayName: u }))
      .then(() => {
        localStorage.removeItem("guestMode");
        window.location = "index.html";
      })
      .catch(err => setMsg(friendlyAuthError(err)));
    return;
  }

  auth.signInWithEmailAndPassword(email, p)
    .then(() => {
      localStorage.removeItem("guestMode");
      window.location = "index.html";
    })
    .catch(err => setMsg(friendlyAuthError(err)));
}

function guest(){
  auth.signOut().finally(() => {
    localStorage.setItem("guestMode", "true");
    window.location = "index.html";
  });
}
</script>

<footer style="background:#0a0a0b; padding:25px 20px; text-align:center; color:#666; font-size:13px; border-top:1px solid #2a2a2c;">
  &copy; 2026 <span style="color:gold;">Nails by Trin</span> &middot; Made by <span style="color:gold;">Archea.inc</span>
</footer>

</body>
</html>
